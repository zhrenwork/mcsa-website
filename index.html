<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>MCSA</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#efefef;
    }

    header{
      background:white;
      padding:30px 80px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:20px;
    }

    .logo-circle{
      width:100px;
      height:100px;
      border-radius:50%;
      border:2px solid #ccc;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    nav{
      display:flex;
      gap:40px;
      font-size:22px;
      font-weight:bold;
    }

    .hero{
      height:800px;
      background:#e6dfc2;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
    }

    .hero h1{
      font-size:72px;
      margin-bottom:40px;
    }

    .hero button{
      background:#9f1f1f;
      color:white;
      border:none;
      padding:16px 30px;
      border-radius:6px;
      font-size:18px;
    }

    .cards{
      display:flex;
      justify-content:center;
      gap:40px;
      padding:120px 60px;
    }

    .card{
      text-align:center;
    }

    .card-image{
      width:320px;
      height:420px;
      background:linear-gradient(white,#eaa);
      margin-bottom:25px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:40px;
    }

    .card a{
      color:#d33;
      font-size:28px;
    }

    .social{
      background:#111;
      color:white;
      padding:80px;
    }

    .social-grid{
      display:flex;
      justify-content:center;
      gap:40px;
    }

    .qr{
      width:260px;
      height:260px;
      background:white;
      color:black;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:20px;
    }

    footer{
      background:white;
      text-align:center;
      padding:80px;
    }
  </style>
</head>

<body>
<!-- Opening Animation -->
<div id="intro">
  <div class="intro-panel top"></div>
  <div class="intro-panel bottom"></div>

  <div class="intro-content">
    <!-- 如果你有 logo，把 src 换成你的 logo 路径 -->
    <!-- <img src="images/logo.png" alt="MCSA Logo" class="intro-logo"> -->

    <h1>MCSA</h1>
    <p>Monash Chinese Student Association</p>
  </div>
</div>
<header>

  <div class="logo">

    <div class="logo-circle">
      <img src="logo.png" width="100%">
    </div>

    <div>
      <h2 style="color:#9f1f1f;">
        蒙纳士大学中国学生会
      </h2>

      <p style="color:#c55;">
        Monash Chinese Student Association
      </p>
    </div>

  </div>

  <nav>
    <div>关于我们</div>
    <div>最新活动</div>
    <div>校园资讯</div>
    <div>往期回顾</div>
    <div>MCSA招新</div>
    <div>历届主席</div>
    <div>折扣商家</div>
    <div>年度赞助</div>
  </nav>

</header>

<section class="hero">

  <h1>MCSA欢迎您</h1>

  <button>关于我们</button>

</section>

<section class="cards">

  <div class="card">
    <div class="card-image">IMAGE</div>
    <a>部门介绍</a>
  </div>

  <div class="card">
    <div class="card-image">IMAGE</div>
    <a>新生指南</a>
  </div>

  <div class="card">
    <div class="card-image">IMAGE</div>
    <a>加入我们</a>
  </div>

</section>

<section class="social">

  <div class="social-grid">

    <div>
      <div class="qr">
      <img src="wechat.jpg" width="100%">
    </div>

    <div>
      <div class="qr">
      <img src="instagram.jpg" width="100%">
    </div>

    <div>
      <div class="qr">QR</div>
      <p>抖音</p>
    </div>

    <div>
      <div class="qr">QR</div>
      <p>小红书</p>
    </div>

  </div>

</section>

<footer>

  <p>
    IT Support 邮箱：
    monashcsait@gmail.com
  </p>

  <br><br>

  <h2>MCSA蒙纳士大学中国学生会</h2>

</footer>

</body>
</html>
