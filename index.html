<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MCSA</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #f5f5f5;
      color: #222;
      overflow-x: hidden;
    }

    /* =========================
       Opening Animation
    ========================= */

    #opening-screen {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100vh;
      z-index: 9999;
      overflow: hidden;
      background: #e8dfbd;
      pointer-events: none;
    }

    .opening-half {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50vh;
      overflow: hidden;
      background: #e8dfbd;
      transition: transform 1.4s ease-in-out;
    }

    .top-half {
      top: 0;
    }

    .bottom-half {
      bottom: 0;
    }

    .opening-half img {
      position: absolute;
      left: 0;
      width: 100%;
      height: 100vh;
      object-fit: cover;
    }

    .top-half img {
      top: 0;
    }

    .bottom-half img {
      bottom: 0;
    }

    #opening-screen.open .top-half {
      transform: translateY(-100%);
    }

    #opening-screen.open .bottom-half {
      transform: translateY(100%);
    }

    #opening-screen.hide {
      display: none;
    }

    /* =========================
       Homepage
    ========================= */

    header {
      width: 100%;
      padding: 24px 70px;
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo img {
      width: 68px;
      height: 68px;
      object-fit: contain;
      border-radius: 50%;
    }

    .logo h1 {
      font-size: 28px;
      letter-spacing: 1px;
    }

    nav {
      display: flex;
      gap: 32px;
    }

    nav a {
      text-decoration: none;
      color: #222;
      font-size: 16px;
      font-weight: 600;
    }

    nav a:hover {
      color: #b8232f;
    }

    .hero {
      min-height: 100vh;
      padding: 160px 80px 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #efefef;
    }

    .hero-content {
      max-width: 900px;
    }

    .hero-content h2 {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .hero-content p {
      font-size: 24px;
      color: #555;
      line-height: 1.6;
    }

    .hero-content .btn {
      display: inline-block;
      margin-top: 36px;
      padding: 14px 34px;
      background: #b8232f;
      color: white;
      border-radius: 999px;
      text-decoration: none;
      font-weight: bold;
    }

    .hero-content .btn:hover {
      background: #941c26;
    }

    @media (max-width: 768px) {
      header {
        padding: 18px 24px;
        flex-direction: column;
        gap: 16px;
      }

      nav {
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .hero {
        padding: 180px 24px 60px;
      }

      .hero-content h2 {
        font-size: 40px;
      }

      .hero-content p {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <!-- Opening Animation -->
  <div id="opening-screen">
    <div class="opening-half top-half">
      <img src="images/opening.gif" alt="MCSA Opening Animation">
    </div>

    <div class="opening-half bottom-half">
      <img src="images/opening.gif" alt="MCSA Opening Animation">
    </div>
  </div>

  <!-- Website Content -->
  <header>
    <div class="logo">
      <img src="images/logo.png" alt="MCSA Logo">
      <h1>MCSA</h1>
    </div>

    <nav>
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#events">Events</a>
      <a href="#membership">Membership</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- First Screen: Home -->
  <section id="home" class="hero">
    <div class="hero-content">
      <h2>Welcome to MCSA</h2>
      <p>Monash Chinese Students Association</p>
      <a href="#about" class="btn">Explore More</a>
    </div>
  </section>

  <script>
    window.addEventListener("load", function () {
      const opening = document.getElementById("opening-screen");

      setTimeout(() => {
        opening.classList.add("open");
      }, 2200);

      setTimeout(() => {
        opening.classList.add("hide");
      }, 3800);
    });
  </script>

</body>
</html>
